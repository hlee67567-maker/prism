<style>
:root {
  --shimmer-bg: linear-gradient(135deg, #fff 0%, #C8B0FF 45%, #fff 100%);
  --bg: #000;
  --c-core: #C8B0FF;
  --c-supplier: #7AB8FF;
  --c-customer: #7AFFE5;
  --c-partner: #FFB87A;
  --c-subsidiary: #FF7AB8;
}
@keyframes shimmerSlow { 0%,100% { background-position: 0% 50% } 50% { background-position: 100% 50% } }
@keyframes blink { 0%,100% { opacity:1 } 50% { opacity:.3 } }
@keyframes fadeUp { from { opacity:0; transform: translateY(20px) } to { opacity:1; transform: translateY(0) } }
@keyframes pulse { 0%,100% { opacity:.6; transform: scale(1) } 50% { opacity:1; transform: scale(1.15) } }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  font-family: "DM Sans", system-ui, sans-serif;
  color: #fff;
  overflow: hidden;
  height: 100vh;
}

/* ── Top Bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 56px; padding: 0 32px;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; gap: 24px;
}
.topbar-brand {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 500; letter-spacing: .18em;
}

/* ── Search ── */
.search-wrap {
  position: fixed;
  top: 88px;
  left: 0; right: 0;
  z-index: 90;
  display: flex;
  justify-content: center;
  align-items: flex-start;      /* 防止子元素被拉伸到全屏高 */
  pointer-events: none;
  animation: fadeUp .6s ease both;
}
.search-box {
  pointer-events: auto;     /* 但 box 自己接收 */
  width: min(520px, calc(100% - 64px));
}
.search-box {
  position: relative;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 100px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: all .25s;
}
.search-box.focus {
  border-color: rgba(184,160,255,.5);
  box-shadow: 0 0 30px rgba(184,160,255,.25), 0 8px 32px rgba(0,0,0,.4);
  background: rgba(184,160,255,.04);
}
.search-box input {
  width: 100%;
  background: transparent;
  border: none; outline: none;
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  padding: 14px 24px 14px 50px;
  letter-spacing: .01em;
}
.search-box input::placeholder { color: rgba(255,255,255,.35); }
.search-icon {
  position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  color: rgba(255,255,255,.4);
}
.search-clear {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.5);
  display: none; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px;
  border: none;
}
.search-clear:hover { background: rgba(255,255,255,.15); color: #fff; }
.search-clear.show { display: flex; }

.suggest {
  margin-top: 8px;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  overflow: hidden;
  max-height: 380px;
  overflow-y: auto;
  display: none;
  box-shadow: 0 16px 48px rgba(0,0,0,.6);
}
.suggest.show { display: block; }
.suggest-item {
  padding: 12px 18px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.04);
  transition: background .15s;
  display: flex; align-items: center; gap: 12px;
}
.suggest-item:last-child { border: none; }
.suggest-item:hover, .suggest-item.active {
  background: rgba(184,160,255,.1);
}
.suggest-icon {
  width: 28px; height: 28px; border-radius: 6px;
  background: rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,.6);
  flex-shrink: 0;
}
.suggest-main { flex: 1; min-width: 0; }
.suggest-name {
  font-size: 13.5px; color: #fff; font-weight: 500;
  margin-bottom: 2px;
  display: flex; align-items: center; gap: 8px;
}
.suggest-name em { font-style: normal; color: #C8B0FF; font-weight: 600; }
.suggest-meta {
  font-size: 11px; color: rgba(255,255,255,.4);
  font-family: "JetBrains Mono", monospace;
}
.suggest-empty {
  padding: 24px; text-align: center;
  color: rgba(255,255,255,.3); font-size: 12.5px;
}

/* ── Canvas Stage ── */
.stage {
  position: fixed; inset: 0;
  z-index: 1;
}
#canvas { display: block; cursor: grab; }
#canvas:active { cursor: grabbing; }

/* ── Center Node Info Panel ── */
.center-info {
  position: fixed; bottom: 40px; left: 40px; z-index: 50;
  background: rgba(0,0,0,.72);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid rgba(184,160,255,.22);
  border-radius: 18px;
  padding: 24px 28px;
  max-width: 360px;
  animation: fadeUp .6s ease both;
  box-shadow: 0 24px 64px rgba(0,0,0,.4), 0 0 32px rgba(184,160,255,.08);
  display: none;
  overflow: hidden;
}
.center-info::before {
  content: "";
  position: absolute;
  top: 0; left: 18%; right: 18%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,160,255,.6), transparent);
}
.center-info.show { display: block; }
.center-eyebrow {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px; letter-spacing: .2em;
  color: rgba(184,160,255,.7);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.center-name {
  font-size: 24px; font-weight: 300; letter-spacing: -.01em;
  margin-bottom: 4px;
  background: var(--shimmer-bg);
  background-size: 200% 100%;
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  animation: shimmerSlow 8s ease-in-out infinite;
}
.center-short {
  font-size: 12px; color: rgba(255,255,255,.5);
  margin-bottom: 14px;
  font-family: "JetBrains Mono", monospace;
}
.center-intro {
  font-size: 13px; line-height: 1.6; color: rgba(255,255,255,.7);
  margin-bottom: 16px;
}
.center-stats {
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.stat-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.stat-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 11px 7px 9px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 100px;
  font-family: inherit;
  cursor: pointer;
  transition: all .2s;
  color: rgba(255,255,255,.65);
}
.stat-chip:hover {
  background: rgba(255,255,255,.07);
  border-color: rgba(255,255,255,.18);
  color: #fff;
}
.stat-chip.on {
  background: color-mix(in srgb, var(--chip-color, #C8B0FF) 18%, transparent);
  border-color: var(--chip-color, #C8B0FF);
  color: #fff;
  box-shadow: 0 0 14px color-mix(in srgb, var(--chip-color, #C8B0FF) 35%, transparent);
}
.stat-chip-all.on {
  background: rgba(255,255,255,.12);
  border-color: rgba(255,255,255,.35);
  color: #fff;
  box-shadow: 0 0 12px rgba(255,255,255,.15);
}
.chip-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.chip-n {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  font-weight: 400;
}
.chip-l {
  font-size: 11px;
  letter-spacing: .02em;
}

/* ── Hover Tooltip ── */
.tip {
  position: fixed; z-index: 60;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12.5px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  max-width: 240px;
}
.tip.show { opacity: 1; }
.tip-name { font-weight: 500; color: #fff; margin-bottom: 2px; }
.tip-meta { font-size: 10.5px; color: rgba(255,255,255,.5); font-family: "JetBrains Mono", monospace; }
.tip-rel { color: #C8B0FF; }

/* ── Legend ── */
.legend {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 50;
  background: rgba(0,0,0,.62);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px;
  padding: 14px 18px;
  font-size: 11px;
  max-width: 220px;
  box-shadow: 0 16px 48px rgba(0,0,0,.3);
  display: none;
  animation: fadeUp .6s ease both;
}
.legend.show { display: block; }
.legend-t {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px; letter-spacing: .18em;
  color: rgba(255,255,255,.4);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.legend-i {
  display: flex; align-items: center; gap: 9px;
  padding: 4px 0;
  color: rgba(255,255,255,.7);
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Tips bottom-center ── */
.controls-tip {
  position: fixed; bottom: 64px;
  left: 0; right: 0;
  z-index: 50;
  font-family: "JetBrains Mono", monospace;
  font-size: 10.5px;
  color: rgba(255,255,255,.3);
  letter-spacing: .12em;
  text-transform: uppercase;
  gap: 24px;
  justify-content: center;
  display: none;
  animation: fadeUp .6s .1s ease both;
  pointer-events: none;
}
.controls-tip.show { display: flex; }
.controls-tip span b { color: rgba(184,160,255,.7); font-weight: 400; }

/* ── Empty State ── */
.empty-state {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: grid;
  place-items: center;
  text-align: center;
  pointer-events: none;
  animation: fadeUp 1s ease both;
}
.empty-state-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 480px;
  padding: 0 24px;
}
.empty-orb {
  width: 200px; height: 200px;
  margin: 0 auto 36px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  animation: orbFloat 6s ease-in-out infinite;
}
.empty-orb::before {
  content: ""; position: absolute; inset: -25%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(184,160,255,.18) 0%, transparent 60%);
  animation: pulse 4s ease-in-out infinite;
  z-index: 0;
}
.empty-orb img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 0 32px rgba(184,160,255,.35)) drop-shadow(0 0 64px rgba(122,184,255,.2));
  animation: orbBreathe 5s ease-in-out infinite;
  transform-origin: center;
}
@keyframes orbFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes orbBreathe {
  0%,100% {
    transform: scale(1);
    filter: drop-shadow(0 0 32px rgba(184,160,255,.35)) drop-shadow(0 0 64px rgba(122,184,255,.2));
  }
  50% {
    transform: scale(1.06);
    filter: drop-shadow(0 0 48px rgba(184,160,255,.5)) drop-shadow(0 0 96px rgba(122,184,255,.3));
  }
}
.empty-t {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: -.01em;
  background: var(--shimmer-bg);
  background-size: 200% 100%;
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  animation: shimmerSlow 8s ease-in-out infinite;
  margin-bottom: 10px;
  line-height: 1.4;
}
.empty-s {
  font-size: 11px;
  color: rgba(255,255,255,.32);
  font-family: "JetBrains Mono", monospace;
  letter-spacing: .18em;
  text-transform: uppercase;
}

/* ── Back button ── */
.back-btn {
  position: fixed; top: 84px; right: 32px; z-index: 90;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 100px;
  padding: 9px 18px;
  font-size: 12px;
  color: rgba(255,255,255,.7);
  cursor: pointer;
  font-family: inherit;
  display: none;
  transition: all .2s;
}
.back-btn.show { display: inline-flex; align-items: center; gap: 6px; }
.back-btn:hover { background: rgba(184,160,255,.12); border-color: rgba(184,160,255,.4); color: #fff; }

.center-heat {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,.06);
  width: 100%;
  display: flex; flex-direction: column; gap: 10px;
}
.heat-bar-wrap { display: flex; flex-direction: column; gap: 6px; }
.heat-bar-label {
  font-size: 10.5px; color: rgba(255,255,255,.45);
  letter-spacing: .04em;
  font-family: "JetBrains Mono", monospace;
}
.heat-bar {
  height: 4px; background: rgba(255,255,255,.06);
  border-radius: 100px; overflow: hidden;
}
.heat-bar-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, #7AB8FF, #C8B0FF, #FFB87A);
  box-shadow: 0 0 8px rgba(184,160,255,.4);
  transition: width .5s ease;
}
.heat-bar-val {
  font-family: "JetBrains Mono", monospace;
  font-size: 13px; color: #fff;
  align-self: flex-end;
}
.heat-bar-val span { color: rgba(255,255,255,.35); font-size: 10.5px; }
.heat-hot-tag {
  font-size: 11px;
  color: #FFB87A;
  padding: 4px 10px;
  background: rgba(255,184,122,.08);
  border: 1px solid rgba(255,184,122,.25);
  border-radius: 100px;
  align-self: flex-start;
  font-family: "JetBrains Mono", monospace;
  letter-spacing: .02em;
}

/* legend 加热度说明 */
.legend-sep { height: 1px; background: rgba(255,255,255,.06); margin: 10px 0; }
.legend-heat {
  font-size: 11px; color: rgba(255,255,255,.5);
  line-height: 1.6;
  font-family: "JetBrains Mono", monospace;
  letter-spacing: .02em;
}
.legend-heat strong { color: #C8B0FF; font-weight: 400; }


.footnote {
  position: fixed;
  bottom: 20px;
  left: 0;
  right: 320px;  /* 给右下 Legend 留出位置 */
  z-index: 40;
  font-family: "JetBrains Mono", monospace;
  font-size: 10.5px;
  color: rgba(255,255,255,.32);
  letter-spacing: .04em;
  text-align: center;
  pointer-events: none;
  line-height: 1.5;
  display: none;
  animation: fadeUp .6s .2s ease both;
  padding: 0 24px;
}
.footnote.show { display: block; }

   响应式适配
═══════════════════════════════════════════════════════════════ */

/* 中等屏幕 (≤ 1280px) */
@media (max-width: 1280px) {
  .center-info { max-width: 320px; padding: 20px 22px; left: 24px; bottom: 24px; }
  .legend { right: 24px; bottom: 24px; padding: 14px 16px; font-size: 11px; }
  .topbar { padding: 0 24px; }
}

/* 小屏幕 / 平板 (≤ 900px) */
@media (max-width: 900px) {
  .search-wrap {
    top: 72px;
  }
  .search-box {
    width: calc(100% - 32px);
  }
  .topbar { padding: 0 16px; gap: 16px; height: 52px; }
  .topbar-title { display: none; }
  .center-info {
    position: fixed;
    left: 16px; right: 16px; bottom: 16px;
    max-width: none;
    padding: 18px 20px;
  }
  .legend {
    display: none;  /* 小屏隐藏 legend，让画面更清爽 */
  }
  .controls-tip { display: none; }
  .footnote { font-size: 9.5px; bottom: 20px; padding: 0 16px; }
  .empty-orb { width: 96px; height: 96px; margin-bottom: 24px; }
  .empty-t { font-size: 15px; }
  .back-btn { top: 72px; right: 16px; font-size: 11px; padding: 7px 14px; }
}

/* 极小屏幕 / 手机 (≤ 480px) */
@media (max-width: 480px) {
  .center-info {
    padding: 14px 16px;
  }
  .center-name { font-size: 20px; }
  .center-intro { font-size: 12px; -webkit-line-clamp: 3; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }
  .center-stats { gap: 12px; }
  .center-stat-n { font-size: 16px; }
  .topbar-brand { font-size: 12px; }
  .search-box input { font-size: 13px; padding: 12px 22px 12px 44px; }
  .suggest { max-height: 280px; }
  .suggest-item { padding: 10px 14px; }
}

/* 极矮屏 (横屏手机) */
@media (max-height: 500px) {
  .empty-orb { width: 64px; height: 64px; margin-bottom: 16px; }
  .empty-t { font-size: 14px; margin-bottom: 6px; }
  .center-info { padding: 12px 16px; }
  .center-stats { padding-top: 8px; gap: 10px; }
  .center-heat { margin-top: 8px; padding-top: 8px; }
}

}

}

  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,.06);
  width: 100%;
  display: flex; flex-direction: column;
  gap: 6px;
  max-height: 260px;
  overflow-y: auto;
}
.exec-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: rgba(255,255,255,.025);
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s;
}
.exec-row:hover { background: rgba(232,184,224,.10); }
.exec-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, #E8B8E0, #C8B0FF);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 13px; font-weight: 500;
  flex-shrink: 0;
}
.exec-meta { flex: 1; min-width: 0; }
.exec-name { font-size: 13px; color: rgba(255,255,255,.9); }
.exec-title {
  font-size: 11px; color: rgba(255,255,255,.45);
  font-family: "JetBrains Mono", monospace;
  margin-top: 1px;
}
.exec-arrow { font-size: 14px; color: rgba(184,160,255,.6); }
.exec-row:hover .exec-arrow { color: #fff; }

.exec-hls {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 12px;
}
.exec-hl {
  font-size: 11px;
  padding: 3px 9px;
  background: rgba(232,184,224,.10);
  border: 1px solid rgba(232,184,224,.28);
  border-radius: 100px;
  color: #E8B8E0;
  letter-spacing: .02em;
}

.exec-stats {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.exec-stat { display: flex; flex-direction: column; gap: 2px; }
.exec-stat-n {
  font-family: "JetBrains Mono", monospace;
  font-size: 16px; color: #fff;
}
.exec-stat-l {
  font-size: 10px; color: rgba(255,255,255,.4);
  letter-spacing: .08em; text-transform: uppercase;
}

.exec-section-t {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  letter-spacing: .14em;
  color: rgba(255,255,255,.4);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.exec-pos-list, .exec-edu-list { display: flex; flex-direction: column; gap: 4px; }
.exec-pos-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  background: rgba(255,255,255,.025);
  border-radius: 8px;
  transition: background .15s;
}
.exec-pos-row[onclick]:hover { background: rgba(200,176,255,.10); }
.exec-pos-icon {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  width: 14px; text-align: center;
}
.exec-pos-meta { flex: 1; min-width: 0; }
.exec-pos-comp { font-size: 12.5px; color: rgba(255,255,255,.85); }
.exec-pos-title {
  font-size: 10.5px;
  color: rgba(255,255,255,.45);
  font-family: "JetBrains Mono", monospace;
  margin-top: 1px;
}
.exec-pos-arrow { font-size: 13px; color: rgba(184,160,255,.55); }
.exec-pos-row[onclick]:hover .exec-pos-arrow { color: #fff; }
.exec-edu-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 10px;
  background: rgba(176,200,255,.04);
  border-radius: 6px;
}
.exec-edu-school { font-size: 12px; color: rgba(255,255,255,.85); }
.exec-edu-degree {
  font-size: 10.5px;
  color: #B0C8FF;
  font-family: "JetBrains Mono", monospace;
}
.exec-assoc-list { display: flex; gap: 6px; flex-wrap: wrap; }
.exec-assoc-chip {
  font-size: 11px;
  padding: 4px 10px;
  background: rgba(224,204,255,.08);
  border: 1px solid rgba(224,204,255,.22);
  border-radius: 100px;
  color: rgba(255,255,255,.7);
}

<script>
// ═══════════════════════════════════════════════════════════════
// Supabase 配置
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://wkipxttondskeefqwswp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndraXB4dHRvbmRza2VlZnF3c3dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTUwMDUsImV4cCI6MjA5MzU5MTAwNX0.f8n0h7qo0QeNqD1oiD2-hLgxoAwTPdQWFyhNvGW8jZo';

// 高层图谱全局数据
const PERSONS = [];
const POSITIONS = [];
const EDUCATIONS = [];
const ASSOCIATIONS = [];
const EVENTS = [];

async function loadGraphData() {
  const t0 = performance.now();
  try {
    const headers = {
      apikey: SUPABASE_KEY,
      Authorization: 'Bearer ' + SUPABASE_KEY,
      Accept: 'application/json'
    };
    const [entsRes, relsRes, chainsRes, prsRes, posRes, eduRes, assocRes, evtRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/graph_enterprises?is_active=eq.true&select=*`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/graph_relations?is_active=eq.true&select=*`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/graph_chains?is_active=eq.true&select=*&order=sort_order`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/graph_persons?is_active=eq.true&select=*`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/graph_positions?is_active=eq.true&select=*`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/graph_education?is_active=eq.true&select=*`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/graph_associations?is_active=eq.true&select=*`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/graph_events?is_active=eq.true&select=*`, { headers }),
    ]);
    if (!entsRes.ok || !relsRes.ok || !chainsRes.ok || !prsRes.ok) throw new Error('Supabase fetch failed');
    const [ents, rels, chains, prs, poses, edus, assocs, evts] = await Promise.all([
      entsRes.json(), relsRes.json(), chainsRes.json(),
      prsRes.json(), posRes.json(), eduRes.json(), assocRes.json(), evtRes.json()
    ]);
    if (!ents.length) throw new Error('Empty DB');

    // 加载人物数据
    PERSONS.length = 0;
    prs.forEach(p => PERSONS.push({
      id: p.id, name: p.name,
      short_names: p.short_names || [],
      current_title: p.current_title,
      current_company_id: p.current_company_id,
      intro: p.intro,
      highlights: p.highlights || [],
    }));
    POSITIONS.length = 0;
    poses.forEach(p => POSITIONS.push({
      id: p.id,
      person_id: p.person_id,
      company_id: p.company_id,
      company_name: p.company_name,
      title: p.title,
      period: p.period,
      type: p.type,
      source: p.source,
    }));
    EDUCATIONS.length = 0;
    edus.forEach(e => EDUCATIONS.push({
      person_id: e.person_id,
      school_name: e.school_name,
      degree: e.degree,
      department: e.department,
      major: e.major,
      graduation_year: e.graduation_year,
    }));
    ASSOCIATIONS.length = 0;
    assocs.forEach(a => ASSOCIATIONS.push({
      person_id: a.person_id,
      association_name: a.association_name,
      role: a.role,
    }));
    EVENTS.length = 0;
    evts.forEach(e => EVENTS.push({
      event_name: e.event_name,
      event_date: e.event_date,
      attendee_person_ids: e.attendee_person_ids || [],
      source: e.source,
    }));

    // 替换内置 demo 数据
    ENTERPRISES.length = 0;
    ents.forEach(e => {
      ENTERPRISES.push({
        id: e.id,
        name: e.name,
        full_name: e.full_name,
        credit_code: e.credit_code,
        short: e.short_names || [],
        type: e.type,
        sector: e.sector,
        intro: e.intro,
        channel_level: e.channel_level,
      });
    });
    RELATIONS.length = 0;
    rels.forEach(r => {
      RELATIONS.push({
        from: r.from_id,
        to: r.to_id,
        type: r.type,
        label: r.label,
        source: r.source,
        heat: r.heat,
      });
    });
    // 重组 INDUSTRY_CHAINS
    const chainMap = {};
    chains.forEach(c => {
      if (!chainMap[c.sector]) {
        chainMap[c.sector] = {
          title: c.chain_title || c.sector + '产业链',
          updated: c.updated_period,
          segments: [],
        };
      }
      // 同 segment 聚合 companies
      let seg = chainMap[c.sector].segments.find(s => s.tier === c.tier && s.segment === c.segment);
      if (!seg) {
        seg = { tier: c.tier, segment: c.segment, companies: [], source: c.source };
        chainMap[c.sector].segments.push(seg);
      }
      seg.companies.push(c.company_name);
    });
    for (const k in INDUSTRY_CHAINS) delete INDUSTRY_CHAINS[k];
    Object.assign(INDUSTRY_CHAINS, chainMap);

    const t1 = performance.now();
    console.log(`✓ Supabase loaded: ${ents.length} ents / ${rels.length} rels / ${chains.length} chains / ${prs.length} persons / ${poses.length} positions (${(t1-t0).toFixed(0)}ms)`);
    return true;
  } catch (err) {
    console.warn('Supabase load failed, using built-in demo data:', err.message);
    return false;
  }
}

// 点击空白处关闭侧滑面板（但不影响图谱拖拽）
document.addEventListener('click', function(e) {
  const panel = document.getElementById('relationPanel');
  if (!panel || !panel.classList.contains('show')) return;
  // 点击的是面板内部 / 关系卡 / 节点本身 → 不关
  if (panel.contains(e.target)) return;
  if (e.target.closest('.rel-card')) return;
  if (e.target.closest('canvas')) return;  // 画布上的节点点击让 handleClick 处理
  panel.classList.remove('show');
});

// ESC 键关闭
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const panel = document.getElementById('relationPanel');
    if (panel) panel.classList.remove('show');
    const det = document.getElementById('entDetail');
    if (det) det.classList.remove('show');
  }
});

window.addEventListener('DOMContentLoaded', () => {
  loadGraphData().then(ok => {
    // ?focus=E305 自动加载该公司高层图谱
    const params = new URLSearchParams(window.location.search);
    const focusId = params.get('focus');
    if (focusId) {
      const ent = ENTERPRISES.find(e => e.id === focusId);
      if (ent) {
        setTimeout(() => {
          searchInput.value = ent.name;
          searchClear.classList.add('show');
          buildCompanyPersonsGraph(focusId);
        }, 300);
        return;
      }
    }
    if (ok) {
      if (centerId && centerId.startsWith('_INDUSTRY_')) {
        buildIndustryGraph(currentSector, null);
      } else if (centerId) {
        buildGraph(centerId);
      }
    }
  });
});

const TYPE_COLORS = { core:'#E8DFFF', supplier:'#7AB8FF', customer:'#9B8BFF', partner:'#C8B0FF', subsidiary:'#A0C8FF', channel:'#D0B8FF', brand:'#E8B8E0' };

// 搜索 + 建议
// ═══════════════════════════════════════════════════════════════
const searchInput = $('searchInput');
const searchBox = $('searchBox');
const suggest = $('suggest');
const searchClear = $('searchClear');
let activeIdx = -1;

searchInput.addEventListener('focus', () => searchBox.classList.add('focus'));
searchInput.addEventListener('blur', () => setTimeout(() => searchBox.classList.remove('focus'), 200));
searchInput.addEventListener('input', onSearch);
searchInput.addEventListener('keydown', onKey);
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('show');
  suggest.classList.remove('show');
  searchInput.focus();
});

function onSearch() {
  const q = searchInput.value.trim().toLowerCase();
  searchClear.classList.toggle('show', !!q);
  if (!q) { suggest.classList.remove('show'); return; }

  // 高层图谱：搜索人物和公司
  const personHits = PERSONS.filter(p => {
    if (p.name.toLowerCase().includes(q)) return true;
    return (p.short_names || []).some(s => s.toLowerCase().includes(q));
  }).slice(0, 5);

  const entHits = ENTERPRISES.filter(e => {
    if (e.name.toLowerCase().includes(q)) return true;
    return (e.short || []).some(s => s.toLowerCase().includes(q));
  }).slice(0, 5);

  if (!personHits.length && !entHits.length) {
    suggest.innerHTML = '<div class="suggest-empty">没有找到相关高层或公司</div>';
    suggest.classList.add('show');
    return;
  }

  let html = '';
  if (personHits.length) {
    html += '<div class="suggest-section">高层</div>';
    html += personHits.map((p, i) => {
      const matched = (p.short_names || []).find(s => s.toLowerCase().includes(q)) || p.name;
      const hi = highlight(matched, q);
      const comp = ENTERPRISES.find(e => e.id === p.current_company_id);
      return `<div class="suggest-item ${i===0?'active':''}" data-type="person" data-id="${p.id}">
        <div class="suggest-icon person-icon">${p.name[0]}</div>
        <div class="suggest-main">
          <div class="suggest-name">${p.name}<em>${hi !== p.name ? hi : ''}</em></div>
          <div class="suggest-meta">${p.current_title || ''}${comp ? ' · ' + comp.name : ''}</div>
        </div>
      </div>`;
    }).join('');
  }
  if (entHits.length) {
    html += '<div class="suggest-section">公司（看高层）</div>';
    html += entHits.map((e, i) => {
      const matched = (e.short || []).find(s => s.toLowerCase().includes(q)) || e.name;
      const hi = highlight(matched, q);
      const personCount = PERSONS.filter(p => p.current_company_id === e.id).length;
      return `<div class="suggest-item" data-type="company" data-id="${e.id}">
        <div class="suggest-icon" style="background:${TYPE_COLORS[e.type]||'#C8B0FF'}22;color:${TYPE_COLORS[e.type]||'#C8B0FF'}">${e.name[0]}</div>
        <div class="suggest-main">
          <div class="suggest-name">${e.name}<em>${hi !== e.name ? hi : ''}</em></div>
          <div class="suggest-meta">${e.sector || ''} · ${personCount ? personCount + ' 位高层' : '无高层数据'}</div>
        </div>
      </div>`;
    }).join('');
  }

  suggest.innerHTML = html;
  suggest.classList.add('show');
  activeIdx = 0;

  suggest.querySelectorAll('.suggest-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      if (el.dataset.type === 'person') {
        selectPerson(el.dataset.id);
      } else {
        selectEntCompany(el.dataset.id);
      }
    });
  });
}

function highlight(text, q) {
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.slice(0, idx) + '<em>' + text.slice(idx, idx + q.length) + '</em>' + text.slice(idx + q.length);
}

function onKey(e) {
  if (!suggest.classList.contains('show')) return;
  const items = suggest.querySelectorAll('.suggest-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); updateActive(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); updateActive(items); }
  else if (e.key === 'Enter') { e.preventDefault(); if (items[activeIdx]) selectEnt(items[activeIdx].dataset.id); }
  else if (e.key === 'Escape') { suggest.classList.remove('show'); searchInput.blur(); if ($('entDetail').classList.contains('show')) closeEntDetail(); }
}
function updateActive(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  items[activeIdx]?.scrollIntoView({ block:'nearest' });
}

function selectEnt(id) {
  // 旧入口：保留兼容
  selectEntCompany(id);
}

function selectPerson(personId) {
  const p = PERSONS.find(x => x.id === personId);
  if (!p) return;
  searchInput.value = p.name;
  searchClear.classList.add('show');
  suggest.classList.remove('show');
  searchInput.blur();
  buildPersonGraph(personId);
}

function selectEntCompany(companyId) {
  const e = getEnt(companyId);
  if (!e) return;
  searchInput.value = e.name;
  searchClear.classList.add('show');
  suggest.classList.remove('show');
  searchInput.blur();
  buildCompanyPersonsGraph(companyId);
}

// 公司视图：以公司为中心 + 其所有高层环绕
function buildCompanyPersonsGraph(companyId) {
  const rc = document.getElementById('relationCards');
  if (rc) rc.classList.remove('show');
  const rp = document.getElementById('relationPanel');
  if (rp) rp.classList.remove('show');

  const company = getEnt(companyId);
  if (!company) return;
  centerId = companyId;
  chainRings = [];
  activeFilter = null;
  viewMode = 'company-persons';

  const myPersons = PERSONS.filter(p => p.current_company_id === companyId);

  nodes = [];
  const center = { ...company, x:0, y:0, z:0, r:38, isCenter:true, useOrb:true };
  nodes.push(center);

  // 外圈：高层（按 type='person'）
  const count = myPersons.length;
  if (count === 0) {
    // 没有高层数据，提示
    $('emptyState').style.display = 'none';
    $('backBtn').classList.add('show');
    document.querySelector('.legend').classList.add('show');
    document.querySelector('.controls-tip').classList.add('show');
    document.querySelector('.footnote').classList.add('show');
    $('centerName').textContent = company.name;
    $('centerShort').textContent = company.short.slice(0, 4).join(' · ');
    $('centerIntro').innerHTML = '<em style="color:#FFB87A">暂无高层数据</em><br>' + (company.intro || '');
    $('centerStats').innerHTML = '';
    $('centerInfo').classList.add('show');
    $('centerInfo').querySelector('.center-eyebrow').textContent = 'COMPANY · 高层视图';
    const oldBadge = $('centerInfo').querySelector('.sector-badge-wrap');
    if (oldBadge) oldBadge.remove();
    rotateY = 0; rotateX = 0; velocityY = 0; velocityX = 0; autoRotate = true;
    return;
  }

  myPersons.forEach((p, i) => {
    const theta = (i / count) * Math.PI * 2;
    const r = 280;
    const lat = (Math.random() - 0.5) * 0.3; // 微小纬度抖动
    const phi = Math.PI/2 - lat;
    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.cos(phi);
    const z = r * Math.sin(phi) * Math.sin(theta);
    nodes.push({
      id: p.id,
      name: p.name,
      isPerson: true,
      personData: p,
      x, y, z,
      r: 22,
      relType: 'person',
      relLabel: p.current_title || '高层',
      heat: 60,
    });
  });

  // 边：公司到所有高层
  edges = myPersons.map(p => ({
    from: companyId, to: p.id,
    type: 'person', heat: 50,
    label: p.current_title || '现任',
    isBelong: true,
  }));

  $('emptyState').style.display = 'none';
  $('backBtn').classList.add('show');
  document.querySelector('.legend').classList.add('show');
  document.querySelector('.controls-tip').classList.add('show');
  document.querySelector('.footnote').classList.add('show');

  updateCompanyPersonsInfo(company, myPersons);

  rotateY = 0; rotateX = 0; velocityY = 0; velocityX = 0; autoRotate = true;
}

// 关系智能：计算两人的关系强度 + 共同点详情
// ═══════════════════════════════════════════════════
function computeRelations(personId) {
  // 返回 [{ otherId, score, reasons: { sameCompany:[], sameSchool:[], sameAssoc:[], coEvents:[] } }, ...]
  // 按 score 降序
  const me = PERSONS.find(p => p.id === personId);
  if (!me) return [];

  const myPositions = POSITIONS.filter(p => p.person_id === personId);
  const myEdu = EDUCATIONS.filter(e => e.person_id === personId);
  const myAssoc = ASSOCIATIONS.filter(a => a.person_id === personId);
  const myEvents = EVENTS.filter(e => (e.attendee_person_ids||[]).includes(personId));

  const results = [];
  PERSONS.filter(p => p.id !== personId).forEach(other => {
    const otherPositions = POSITIONS.filter(p => p.person_id === other.id);
    const otherEdu = EDUCATIONS.filter(e => e.person_id === other.id);
    const otherAssoc = ASSOCIATIONS.filter(a => a.person_id === other.id);
    const otherEvents = EVENTS.filter(e => (e.attendee_person_ids||[]).includes(other.id));

    // 同公司：按公司分组（一家公司一条）
    const companyMap = {};
    myPositions.forEach(mp => {
      otherPositions.forEach(op => {
        const matchById = mp.company_id && op.company_id && mp.company_id === op.company_id;
        const matchByName = !matchById && mp.company_name && op.company_name && mp.company_name === op.company_name;
        if (matchById || matchByName) {
          const ent = getEnt(mp.company_id);
          const key = mp.company_id || mp.company_name;
          if (!companyMap[key]) {
            companyMap[key] = {
              company_id: mp.company_id,
              company_name: ent?.name || mp.company_name || op.company_name,
              my_positions: [],
              other_positions: [],
            };
          }
          if (!companyMap[key].my_positions.find(x => x.title === mp.title && x.period === mp.period)) {
            companyMap[key].my_positions.push({ title: mp.title, period: mp.period, type: mp.type });
          }
          if (!companyMap[key].other_positions.find(x => x.title === op.title && x.period === op.period)) {
            companyMap[key].other_positions.push({ title: op.title, period: op.period, type: op.type });
          }
        }
      });
    });
    const sameCompany = Object.values(companyMap);

    // 同校：按学校分组
    const schoolMap = {};
    myEdu.forEach(me => {
      otherEdu.forEach(oe => {
        if (me.school_name === oe.school_name) {
          if (!schoolMap[me.school_name]) {
            schoolMap[me.school_name] = {
              school_name: me.school_name,
              my_edus: [],
              other_edus: [],
            };
          }
          if (!schoolMap[me.school_name].my_edus.find(x => x.degree === me.degree && x.year === me.graduation_year)) {
            schoolMap[me.school_name].my_edus.push({ degree: me.degree, major: me.major, year: me.graduation_year });
          }
          if (!schoolMap[me.school_name].other_edus.find(x => x.degree === oe.degree && x.year === oe.graduation_year)) {
            schoolMap[me.school_name].other_edus.push({ degree: oe.degree, major: oe.major, year: oe.graduation_year });
          }
        }
      });
    });
    const sameSchool = Object.values(schoolMap);

    // 同协会：按协会分组
    const assocMap = {};
    myAssoc.forEach(ma => {
      otherAssoc.forEach(oa => {
        if (ma.association_name === oa.association_name) {
          if (!assocMap[ma.association_name]) {
            assocMap[ma.association_name] = {
              association_name: ma.association_name,
              my_roles: [],
              other_roles: [],
            };
          }
          if (!assocMap[ma.association_name].my_roles.includes(ma.role || '会员')) {
            assocMap[ma.association_name].my_roles.push(ma.role || '会员');
          }
          if (!assocMap[ma.association_name].other_roles.includes(oa.role || '会员')) {
            assocMap[ma.association_name].other_roles.push(oa.role || '会员');
          }
        }
      });
    });
    const sameAssoc = Object.values(assocMap);

    // 共同活动
    const coEvents = [];
    myEvents.forEach(me => {
      if ((me.attendee_person_ids||[]).includes(other.id)) {
        coEvents.push({
          event_name: me.event_name,
          event_date: me.event_date,
        });
      }
    });

    const score = sameCompany.length * 3 + sameSchool.length * 2 + sameAssoc.length * 2 + coEvents.length * 1.5;
    if (score === 0) return;
    results.push({
      otherId: other.id,
      other,
      score,
      reasons: { sameCompany, sameSchool, sameAssoc, coEvents },
    });
  });

  results.sort((a, b) => b.score - a.score);
  return results;
}

// 节点周围聚合徽章计数
function countSchoolAlumni(schoolName, excludePersonId) {
  return EDUCATIONS.filter(e => e.school_name === schoolName && e.person_id !== excludePersonId).length;
}
function countAssocPeers(assocName, excludePersonId) {
  return ASSOCIATIONS.filter(a => a.association_name === assocName && a.person_id !== excludePersonId).length;
}
function countCompanyExecs(companyId, excludePersonId) {
  return POSITIONS.filter(p => p.company_id === companyId && p.person_id !== excludePersonId).length;
}

// 人物视图：以人为中心 + 任职公司 + 母校 + 协会
function buildPersonGraph(personId) {
  const person = PERSONS.find(p => p.id === personId);
  if (!person) return;
  centerId = personId;
  chainRings = [];
  activeFilter = null;
  viewMode = 'person';

  nodes = [];
  const center = {
    id: person.id,
    name: person.name,
    isPerson: true,
    isCenter: true,
    personData: person,
    x:0, y:0, z:0, r:40,
  };
  nodes.push(center);

  // 找出关联（任职 + 教育 + 协会）
  const myPositions = POSITIONS.filter(p => p.person_id === personId);
  const myEdu = EDUCATIONS.filter(e => e.person_id === personId);
  const myAssoc = ASSOCIATIONS.filter(a => a.person_id === personId);

  // 三层布局
  // 上：任职公司（现任 + 历史 + 兼任）
  // 中：母校
  // 下：协会
  const TIER_Y = { positions: -180, education: 30, assoc: 220 };

  // 上层：任职公司
  myPositions.forEach((pos, i) => {
    const company = getEnt(pos.company_id);
    if (!company) {
      // 万一企业不在表里，用 company_name 占位
      nodes.push({
        id: 'POS_' + pos.id,
        name: pos.company_name || '未知公司',
        isCompany: true,
        isPlaceholder: true,
        positionData: pos,
        x: 0, y: 0, z: 0,
        r: 18,
        relType: pos.type === 'current' ? 'core' : (pos.type === 'concurrent' ? 'partner' : 'subsidiary'),
        relLabel: pos.title + ' · ' + (pos.period||''),
        heat: pos.type === 'current' ? 90 : (pos.type === 'concurrent' ? 60 : 30),
      });
      return;
    }
    nodes.push({
      ...company,
      id: company.id,
      isCompany: true,
      positionData: pos,
      relType: pos.type === 'current' ? 'core' : (pos.type === 'concurrent' ? 'partner' : 'subsidiary'),
      relLabel: pos.title + ' · ' + (pos.period||''),
      heat: pos.type === 'current' ? 90 : (pos.type === 'concurrent' ? 60 : 30),
      r: pos.type === 'current' ? 24 : 20,
      x: 0, y: 0, z: 0,
      _layoutTier: 'positions',
    });
  });

  // 中层：学校
  myEdu.forEach((edu, i) => {
    nodes.push({
      id: 'EDU_' + edu.school_name,
      name: edu.school_name,
      isSchool: true,
      eduData: edu,
      x: 0, y: 0, z: 0,
      r: 18,
      relType: 'school',
      relLabel: (edu.degree || '') + ' · ' + (edu.major || ''),
      heat: 50,
      _layoutTier: 'education',
    });
  });

  // 下层：协会
  myAssoc.forEach((a, i) => {
    nodes.push({
      id: 'ASSOC_' + a.association_name,
      name: a.association_name,
      isAssoc: true,
      assocData: a,
      x: 0, y: 0, z: 0,
      r: 16,
      relType: 'assoc',
      relLabel: a.role || '会员',
      heat: 30,
      _layoutTier: 'assoc',
    });
  });

  // 重置上层 positions 节点用环形布局
  const tierGroups = { positions: [], education: [], assoc: [] };
  nodes.slice(1).forEach(n => {
    if (n._layoutTier) tierGroups[n._layoutTier].push(n);
    else if (n.isCompany || n.isPlaceholder) tierGroups.positions.push(n);
  });

  Object.entries(tierGroups).forEach(([tier, group]) => {
    const y = TIER_Y[tier];
    const baseR = tier === 'education' ? 220 : (tier === 'positions' ? 280 : 260);
    const count = group.length;
    if (!count) return;
    group.forEach((node, i) => {
      const theta = (i / count) * Math.PI * 2 + (tier === 'positions' ? 0 : (tier === 'education' ? 0.4 : 0.8));
      node.x = baseR * Math.cos(theta);
      node.y = y + (Math.random() - 0.5) * 20;
      node.z = baseR * Math.sin(theta);
    });
  });

  // 注册环骨架
  chainRings = [];
  if (tierGroups.positions.length) chainRings.push({ tier:'positions', y:TIER_Y.positions, radius:280, color:'#C8B0FF' });
  if (tierGroups.education.length) chainRings.push({ tier:'education', y:TIER_Y.education, radius:220, color:'#B0C8FF' });
  if (tierGroups.assoc.length) chainRings.push({ tier:'assoc', y:TIER_Y.assoc, radius:260, color:'#E0CCFF' });

  // 边：人物中心 → 每个节点
  edges = [];
  nodes.slice(1).forEach(n => {
    edges.push({
      from: personId, to: n.id,
      type: n.relType, heat: n.heat,
      label: n.relLabel,
      isBelong: true,
    });
  });

  $('emptyState').style.display = 'none';
  $('backBtn').classList.add('show');
  document.querySelector('.legend').classList.add('show');
  document.querySelector('.controls-tip').classList.add('show');
  document.querySelector('.footnote').classList.add('show');

  updatePersonInfo(person, myPositions, myEdu, myAssoc);

  // 计算关系网（用于浮动关系卡）
  const relations = computeRelations(personId);
  window._currentRelations = relations;
  window._currentPersonId = personId;
  renderRelationCards(relations.slice(0, 4), person);  // 取前 4 强关系

  // 给节点附加徽章数据
  nodes.forEach(n => {
    if (n.isSchool) {
      n._badge = countSchoolAlumni(n.eduData.school_name, personId);
    } else if (n.isAssoc) {
      n._badge = countAssocPeers(n.assocData.association_name, personId);
    } else if (n.isCompany || n.isPlaceholder) {
      // 公司：同公司任职过的人数（不含自己）
      n._badge = countCompanyExecs(n.id, personId);
    }
  });

  rotateY = -0.5; rotateX = 0; velocityY = 0; velocityX = 0; autoRotate = true;
  animateRotation(0.3, 0, 1400);
}

// 渲染中心人物两侧的"关键人物"浮动卡
function renderRelationCards(topRels, centerPerson) {
  const wrap = $('relationCards');
  if (!wrap) return;
  if (!topRels.length) {
    wrap.classList.remove('show');
    wrap.innerHTML = '';
    return;
  }
  // 按 score 分级（≥6 五星，≥4 四星，≥2 三星，否则 二星）
  function stars(s) {
    if (s >= 8) return '★★★★★';
    if (s >= 6) return '★★★★';
    if (s >= 4) return '★★★';
    if (s >= 2) return '★★';
    return '★';
  }
  function reasonsTags(r) {
    const t = [];
    if (r.reasons.sameCompany.length) t.push(`同司 ${r.reasons.sameCompany.length}`);
    if (r.reasons.sameSchool.length) t.push(`同校 ${r.reasons.sameSchool.length}`);
    if (r.reasons.sameAssoc.length) t.push(`同会 ${r.reasons.sameAssoc.length}`);
    if (r.reasons.coEvents.length) t.push(`同台 ${r.reasons.coEvents.length}`);
    return t.join(' · ');
  }
  wrap.innerHTML = `
    <div class="rel-card-header">
      <span class="rel-card-eyebrow">RELATED · 关键关系</span>
    </div>
    <div class="rel-card-list">
      ${topRels.map(r => `
        <div class="rel-card" onclick="showRelationDetail('${r.otherId}')">
          <div class="rel-card-avatar">${r.other.name[0]}</div>
          <div class="rel-card-meta">
            <div class="rel-card-name">${r.other.name}</div>
            <div class="rel-card-reasons">${reasonsTags(r)}</div>
          </div>
          <div class="rel-card-score" title="关系强度">${stars(r.score)}</div>
        </div>
      `).join('')}
    </div>
  `;
  wrap.classList.add('show');
}

function buildGraph(rootId) {
  const root = getEnt(rootId);
  if (!root) return;
  centerId = rootId;

  // 找出直接关联（一级关系）
  const directEdges = RELATIONS.filter(r => r.from === rootId || r.to === rootId);
  const relatedIds = new Set([rootId]);
  directEdges.forEach(r => { relatedIds.add(r.from); relatedIds.add(r.to); });

  // 节点：中心 + 一级关系节点
  chainRings = [];
  activeFilter = null;  // 切换中心时重置过滤
  nodes = [];
  const center = { ...root, x:0, y:0, z:0, r:38, isCenter:true, useOrb:true };
  nodes.push(center);

  // 把同类型的节点放在同一"环"，不同类型分布在球面不同区域
  const grouped = {};
  // 关系方向翻转表（中心是 to 时，type 需要反向解读）
  const FLIP = { customer:'supplier', supplier:'customer', partner:'partner', subsidiary:'subsidiary', channel:'brand', brand:'channel' };

  Array.from(relatedIds).filter(id => id !== rootId).forEach(id => {
    const e = getEnt(id);
    if (!e) return;
    const rel = directEdges.find(r => (r.from === rootId && r.to === id) || (r.to === rootId && r.from === id));
    // 关键修复：根据中心视角解读关系类型
    // 原边: from -> to (type 描述的是从 from 看 to 的角色)
    // 如果 root === from，正向；如果 root === to，反向翻转
    const relType = (rel.from === rootId) ? rel.type : FLIP[rel.type];
    grouped[relType] = grouped[relType] || [];
    grouped[relType].push({ ent:e, rel, relType });
  });

  // 球面布局：每种类型占一个纬度带
  const typeOrder = ['subsidiary', 'partner', 'brand', 'customer', 'supplier', 'channel'];
  const totalTypes = typeOrder.filter(t => grouped[t]).length;
  let typeIdx = 0;
  typeOrder.forEach(t => {
    const group = grouped[t];
    if (!group) return;
    // 纬度：从顶部 -0.6 到底部 0.6
    const latRange = totalTypes > 1 ? (typeIdx / (totalTypes - 1)) * 1.2 - 0.6 : 0;
    const lat = latRange;
    const phi = Math.PI/2 - lat * Math.PI/2;  // [PI/2 ~ PI/2 - 0.6*PI/2]
    const count = group.length;
    const radius = 260;  // 所有节点距离相近，热度通过连线表达不通过距离

    group.forEach((g, i) => {
      // 经度均匀分布
      const theta = (i / count) * Math.PI * 2 + (typeIdx * 0.3);
      const r = radius + (Math.random() - .5) * 30;
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.cos(phi);
      const z = r * Math.sin(phi) * Math.sin(theta);
      const sizeR = 20;  // 节点大小统一
      nodes.push({
        ...g.ent,
        x, y, z,
        r: sizeR,
        relType: g.relType,
        relLabel: g.rel.label,
        heat: g.rel.heat || 0,
      });
    });
    typeIdx++;
  });

  // 边：所有跟 root 的直接连接
  edges = directEdges.map(r => {
    const otherId = r.from === rootId ? r.to : r.from;
    const viewType = (r.from === rootId) ? r.type : FLIP[r.type];
    return {
      from: rootId, to: otherId,
      type: viewType, heat: r.heat || 0, label: r.label
    };
  });

  // UI 状态
  $('emptyState').style.display = 'none';
  $('backBtn').classList.add('show');
  document.querySelector('.legend').classList.add('show');
  document.querySelector('.controls-tip').classList.add('show');
  document.querySelector('.footnote').classList.add('show');
  updateCenterInfo(root, directEdges, rootId);

  // 重置旋转
  rotateY = 0; rotateX = 0;
  velocityY = 0; velocityX = 0;
  autoRotate = true;
}

// 行业图谱：以行业为中心，外圈是该行业的代表企业

function buildIndustryGraph(sector, fromEntId) {
  viewMode = 'industry';
  currentSector = sector;
  centerId = '_INDUSTRY_' + sector;

  // 查产业链结构
  const chain = INDUSTRY_CHAINS[sector];
  if (chain) {
    return buildChainGraph(sector, chain, fromEntId);
  }

  // 没有产业链数据 → 回退到简单"行业内企业聚合"模式
  return buildSimpleIndustryGraph(sector, fromEntId);
}

// ─── 产业链图谱：上中下游三层水平环 + 中心垂直轴 ───
function buildChainGraph(sector, chain, fromEntId) {
  const TIER_COLORS = { '上游':'#B0C8FF', '中游':'#C8B0FF', '下游':'#E0CCFF' };
  // 三层垂直位置：往外扩开，避免中游节点贴脸中心
  const TIER_Y = { '上游': -260, '中游': 0, '下游': 260 };
  // 环半径：中游加大到 360（远离中心），上下游同步加大
  const TIER_RADIUS = { '上游': 320, '中游': 360, '下游': 320 };

  // 中心：产业链虚拟节点
  nodes = [];
  const indCenter = {
    id: centerId,
    name: chain.title,
    short: [sector + '行业'],
    intro: `共 ${chain.segments.length} 个环节 · ${chain.segments.reduce((s,seg)=>s+seg.companies.length,0)} 家代表企业`,
    sector: sector,
    isCenter: true,
    isIndustry: true,
    x: 0, y: 0, z: 0,
    r: 44
  };
  nodes.push(indCenter);

  // 按 tier 收集所有企业（不再按 segment 分簇）
  const tiers = ['上游', '中游', '下游'];
  const tierGroups = { '上游': [], '中游': [], '下游': [] };
  chain.segments.forEach(seg => {
    seg.companies.forEach(compName => {
      const ent = findEntByName(compName);
      if (!ent) return;
      tierGroups[seg.tier].push({
        ent,
        tier: seg.tier,
        segment: seg.segment,
        source: seg.source,
      });
    });
  });

  // 每层在水平环上均匀分布
  tiers.forEach(tier => {
    const group = tierGroups[tier];
    if (!group.length) return;
    const y = TIER_Y[tier];
    const radius = TIER_RADIUS[tier];
    const count = group.length;

    group.forEach((g, i) => {
      const theta = (i / count) * Math.PI * 2 + (tier === '上游' ? 0 : (tier === '中游' ? Math.PI / count : 0));
      const x = radius * Math.cos(theta);
      const z = radius * Math.sin(theta);
      const isFromEnt = g.ent.id === fromEntId;
      nodes.push({
        ...g.ent,
        x, y, z,
        r: isFromEnt ? 26 : 20,
        tier: g.tier,
        tierColor: TIER_COLORS[g.tier],
        segment: g.segment,
        source: g.source,
        relType: 'chain',
        relLabel: `${g.tier} · ${g.segment}`,
        heat: isFromEnt ? 100 : 40,
        highlight: isFromEnt,
      });
    });
  });

  // 中心轴节点（上下两个虚拟点，仅用于画连线）
  const axisTop = { id:'_AXIS_TOP', x:0, y:-320, z:0, isAxis:true };
  const axisBot = { id:'_AXIS_BOT', x:0, y:320, z:0, isAxis:true };
  nodes.push(axisTop, axisBot);

  // 边：只有"中心垂直轴"两段 + 同 tier 节点的水平环骨架（弱）
  edges = [];
  // 中心轴：上 → 中 → 下
  edges.push({
    from:'_AXIS_TOP', to:centerId, type:'axis', heat:100, label:'', isAxis:true
  });
  edges.push({
    from:centerId, to:'_AXIS_BOT', type:'axis', heat:100, label:'', isAxis:true
  });

  // 注册三层水平环（用专用渲染路径而非 edges，确保始终是完整圆，跟节点数无关）
  chainRings = tiers.map(tier => ({
    tier,
    y: TIER_Y[tier],
    radius: TIER_RADIUS[tier],
    color: TIER_COLORS[tier],
  })).filter(r => tierGroups[r.tier].length > 0);

  $('emptyState').style.display = 'none';
  $('backBtn').classList.add('show');
  document.querySelector('.legend').classList.add('show');
  document.querySelector('.controls-tip').classList.add('show');
  document.querySelector('.footnote').classList.add('show');
  updateChainInfo(sector, chain, fromEntId);

  // 入场：从右侧倾斜角开始，缓动到向右倾斜 18° 的稳态（地球仪绕 Y 轴侧视）
  rotateY = -0.5; rotateX = 0;
  velocityY = 0; velocityX = 0;
  autoRotate = true;
  animateRotation(0.3, 0, 1400);  // Y 缓动到 +0.3 ≈ 17°，X 不动
}

// 入场旋转动画：从当前 rotateY/X 缓动到 targetY/X
function animateRotation(targetY, targetX, duration) {
  const startY = rotateY, startX = rotateX;
  const t0 = performance.now();
  function step(now) {
    if (isDragging) return;  // 用户手动操作了就停
    const p = Math.min(1, (now - t0) / duration);
    // ease-out cubic
    const e = 1 - Math.pow(1 - p, 3);
    rotateY = startY + (targetY - startY) * e;
    rotateX = startX + (targetX - startX) * e;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function findEntByName(name) {
  // 按 name 完全匹配 + short 别名匹配
  const norm = name.toLowerCase().trim();
  return ENTERPRISES.find(e => {
    if (e.name === name) return true;
    if (e.name.toLowerCase() === norm) return true;
    return e.short && e.short.some(s => s.toLowerCase() === norm);
  });
}

function buildSimpleIndustryGraph(sector, fromEntId) {

    sector: sector, isCenter: true, isIndustry: true,
    x: 0, y: 0, z: 0, r: 42
  };
  nodes.push(indCenter);
  industryEnts.forEach((e, i) => {
    const theta = (i / industryEnts.length) * Math.PI * 2;
    const r = 260;
    const x = r * Math.cos(theta);
    const y = (Math.random() - .5) * 60;
    const z = r * Math.sin(theta);
    const isFromEnt = e.id === fromEntId;
    nodes.push({
      ...e, x, y, z,
      r: isFromEnt ? 26 : 20,
      relType: e.type,
      relLabel: TYPE_LABELS[e.type],
      heat: isFromEnt ? 100 : 50,
      highlight: isFromEnt,

  edges = industryEnts.map(e => ({
    from: centerId, to: e.id,
    type: 'chain', heat: e.id === fromEntId ? 100 : 20,

function updateChainInfo(sector, chain, fromEntId) {
  const fromEnt = fromEntId ? ENTERPRISES.find(e => e.id === fromEntId) : null;
  const TIER_COLORS = { '上游':'#B0C8FF', '中游':'#C8B0FF', '下游':'#E0CCFF' };
  // 各层统计
  const tierStats = { '上游':0, '中游':0, '下游':0 };
  chain.segments.forEach(seg => { tierStats[seg.tier] += seg.companies.length; });

  $('centerName').textContent = chain.title;
  $('centerShort').textContent = `${chain.segments.length} 个环节 · ${Object.values(tierStats).reduce((a,b)=>a+b,0)} 家代表企业`;
  $('centerIntro').innerHTML = fromEnt
    ? `从 <em style="color:#C8B0FF;font-style:normal">${fromEnt.name}</em> 进入。点击外圈企业可切换为该企业的关系图谱。`
    : `点击外圈企业可切换为该企业的关系图谱。`;

  // 加上中下游 stats
  const statsHtml = ['上游','中游','下游'].map(t => {
    const n = tierStats[t];
    if (!n) return '';
    return `<div class="center-stat">
      <div class="center-stat-n" style="color:${TIER_COLORS[t]}">${n}</div>
      <div class="center-stat-l">${t}</div>
    </div>`;
  }).join('');
  $('centerStats').innerHTML = statsHtml;

  // 环节列表
  const segHtml = chain.segments.map(seg => {
    const matched = seg.companies.map(c => findEntByName(c)).filter(Boolean);
    const isFromSeg = fromEnt && matched.find(m => m.id === fromEnt.id);
    return `<div class="seg-row ${isFromSeg?'on':''}" style="border-left-color:${TIER_COLORS[seg.tier]}">
      <div class="seg-meta"><span class="seg-tier" style="color:${TIER_COLORS[seg.tier]}">${seg.tier}</span><span class="seg-name">${seg.segment}</span></div>
      <div class="seg-count">${matched.length}</div>
    </div>`;
  }).join('');
  // 把环节列表追加到 stats 后
  $('centerStats').insertAdjacentHTML('afterend',
    `<div class="seg-list" id="segList">${segHtml}</div>`);
  // 先移除可能的旧 segList
  const oldList = $('centerInfo').querySelector('.seg-list');
  if (oldList && oldList.id !== 'segList') oldList.remove();

  // 数据来源
  const sources = Array.from(new Set(chain.segments.map(s => s.source).filter(Boolean)));
  const oldSrc = $('centerInfo').querySelector('.chain-source');
  if (oldSrc) oldSrc.remove();
  const srcHtml = `<div class="chain-source">

// 3D → 2D 投影（绕 Y 轴 + X 轴旋转）
function project(p) {
  const cosY = Math.cos(rotateY), sinY = Math.sin(rotateY);
  const cosX = Math.cos(rotateX), sinX = Math.sin(rotateX);
  // 绕 Y 轴
  let x = p.x * cosY + p.z * sinY;
  let z = -p.x * sinY + p.z * cosY;
  // 绕 X 轴
  let y = p.y * cosX - z * sinX;
  z = p.y * sinX + z * cosX;
  // 投影（远小近大）
  const fov = 800;
  const dist = 1000;
  const scale = fov / (fov + z + dist * 0.001);
  return {
    sx: W/2 + x * scale * zoom,
    sy: H/2 + y * scale * zoom,
    scale: scale * zoom,
    z, depthFactor: (z + 400) / 800  // 越远越淡
  };
}

// 渲染循环
let lastT = 0;
function render(t) {
  const dt = Math.min((t - lastT) / 16.67, 2);
  lastT = t;

  ctx.clearRect(0, 0, W, H);

  if (!nodes.length) {
    requestAnimationFrame(render);
    return;
  }

  // 自动旋转 / 阻尼
  const sinceInteract = t - userInteractedAt;
  if (autoRotate && !isDragging && sinceInteract > 800) {
    rotateY += 0.002 * dt;
  }
  // 阻尼
  if (!isDragging) {
    rotateY += velocityY * dt;
    rotateX += velocityX * dt;
    velocityY *= 0.93;
    velocityX *= 0.93;
    if (Math.abs(velocityY) < 0.0001) velocityY = 0;
    if (Math.abs(velocityX) < 0.0001) velocityX = 0;
  }
  // 限制 X 轴
  rotateX = Math.max(-1.1, Math.min(1.1, rotateX));

  // 投影所有节点
  const projected = nodes.map(n => ({ node:n, proj:project(n) }));
  projected.sort((a, b) => b.proj.z - a.proj.z);  // 从远到近

  // 先画环骨架（产业链模式专属）
  if (chainRings.length) {
    chainRings.forEach(ring => {
      drawRing(ring);
    });
  }

  // 再画边
  ctx.lineCap = 'round';
  edges.forEach(e => {
    const a = projected.find(p => p.node.id === e.from);
    const b = projected.find(p => p.node.id === e.to);
    if (!a || !b) return;
    const isHover = hoverNode && (hoverNode.id === e.from || hoverNode.id === e.to);
    const baseAlpha = (a.proj.depthFactor + b.proj.depthFactor) / 2;
    let alphaBoost = isHover ? 1 : (hoverNode ? 0.2 : 0.6);
    // 过滤态：检查边的端点是否被过滤
    if (activeFilter) {
      const a_node = nodes.find(n => n.id === e.from);
      const b_node = nodes.find(n => n.id === e.to);
      const aOk = !a_node || a_node.isCenter || a_node.isIndustry || a_node.highlight || (a_node.relType || a_node.type) === activeFilter;
      const bOk = !b_node || b_node.isCenter || b_node.isIndustry || b_node.highlight || (b_node.relType || b_node.type) === activeFilter;
      if (!aOk || !bOk) alphaBoost *= 0.15;
    }
    const color = e.tierColor || TYPE_COLORS[e.type] || '#C8B0FF';

    // ── 中心垂直轴：极简白色细线，贯穿天地 ──
    if (e.isAxis) {
      ctx.strokeStyle = `rgba(200,176,255,${0.4 * baseAlpha})`;
      ctx.lineWidth = 1 * Math.max(0.5, baseAlpha);
      ctx.shadowColor = '#C8B0FF';
      ctx.shadowBlur = 6 * baseAlpha;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(a.proj.sx, a.proj.sy);
      ctx.lineTo(b.proj.sx, b.proj.sy);
      ctx.stroke();
      ctx.shadowBlur = 0;
      return;
    }

    // ── 水平环骨架：很细的虚线，弱化 ──
    if (e.isRing) {
      ctx.strokeStyle = `${color}${hex(0.18 * baseAlpha)}`;
      ctx.lineWidth = 0.7 * Math.max(0.4, baseAlpha);
      ctx.setLineDash([3, 3]);
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(a.proj.sx, a.proj.sy);
      ctx.lineTo(b.proj.sx, b.proj.sy);
      ctx.stroke();
      ctx.setLineDash([]);
      return;
    }

    // ── 普通边（企业图谱内的关系）──
    const heatN = Math.max(0, Math.min(1, e.heat / 100));
    const heatAlpha = e.isBelong ? (0.08 + heatN * 0.3) : (0.25 + heatN * 0.55);
    const grad = ctx.createLinearGradient(a.proj.sx, a.proj.sy, b.proj.sx, b.proj.sy);
    grad.addColorStop(0, `${color}${hex(heatAlpha * alphaBoost * baseAlpha)}`);
    grad.addColorStop(1, `${color}${hex(heatAlpha * 0.4 * alphaBoost * baseAlpha)}`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = (0.5 + heatN * 2.2) * (isHover ? 1.4 : 1) * Math.max(0.4, baseAlpha);
    ctx.shadowColor = color;
    ctx.shadowBlur = isHover ? 16 : (8 * baseAlpha);

    ctx.beginPath();
    ctx.moveTo(a.proj.sx, a.proj.sy);
    ctx.lineTo(b.proj.sx, b.proj.sy);
    ctx.stroke();

    if (e.heat >= 40 && !hoverNode) {
      const particleCount = e.heat >= 70 ? 2 : 1;
      const speed = 0.05 + heatN * 0.08;
      for (let i = 0; i < particleCount; i++) {
        const flow = ((t / 1000 * speed + i / particleCount + e.heat * 0.01) % 1);
        const px = a.proj.sx + (b.proj.sx - a.proj.sx) * flow;
        const py = a.proj.sy + (b.proj.sy - a.proj.sy) * flow;
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(px, py, 1.8 + heatN * 1.2, 0, Math.PI*2);
        ctx.fill();
      }
    }
  });
  ctx.shadowBlur = 0;

  // 画节点
  projected.forEach(({ node, proj }) => {
    if (node.isAxis) return;  // 轴端点不渲染
    const color = node.isCenter ? '#C8B0FF' : (node.tierColor || TYPE_COLORS[node.relType || node.type] || '#C8B0FF');
    // 行业中心节点更大、有外光环
    const extraGlow = node.isIndustry ? 1.6 : 1;
    const isHover = hoverNode && hoverNode.id === node.id;
    const isCenter = node.isCenter;
    const r = node.r * proj.scale;
    const alpha = Math.max(0.4, proj.depthFactor);
    // 过滤判断：activeFilter 设了且节点类型不匹配 → 淡化
    // 中心节点 + 行业节点 + 来源节点（highlight）永远显示
    let filterDim = 1;
    if (activeFilter && !isCenter && !node.isIndustry && !node.highlight) {
      const t = node.relType || node.type;
      if (t !== activeFilter) filterDim = 0.12;
    }
    const dim = (hoverNode && !isHover && !isCenter ? 0.35 : 1) * filterDim;

    // 外光晕（大）
    const glow1 = ctx.createRadialGradient(proj.sx, proj.sy, 0, proj.sx, proj.sy, r * 3.5);
    glow1.addColorStop(0, `${color}${hex(0.4 * alpha * dim)}`);
    glow1.addColorStop(0.5, `${color}${hex(0.12 * alpha * dim)}`);
    glow1.addColorStop(1, `${color}00`);
    ctx.fillStyle = glow1;
    ctx.beginPath();
    ctx.arc(proj.sx, proj.sy, r * 3.5, 0, Math.PI*2);
    ctx.fill();

    // 节点主体：行业中心用玻璃球 icon，其他用渐变玻璃球
    const useOrb = (node.isIndustry || node.useOrb) && orbImage.complete && orbImage.naturalWidth > 0;
    if (useOrb) {
      // 用 icon 渲染中心球
      // 关键：保持原图宽高比，避免变形
      const aspect = orbImage.naturalWidth / orbImage.naturalHeight;
      const breathe = 1 + Math.sin(t / 700) * 0.04;
      // 以"高度"对齐节点半径 r（球的视觉直径），宽度按比例
      const baseH = r * 2.4;
      const finalH = baseH * (isHover ? 1.15 : 1) * breathe;
      const finalW = finalH * aspect;
      ctx.shadowColor = '#C8B0FF';
      ctx.shadowBlur = (isHover ? 36 : 24) * alpha;
      ctx.globalAlpha = alpha * dim;
      ctx.drawImage(orbImage, proj.sx - finalW/2, proj.sy - finalH/2, finalW, finalH);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    } else {
      const grad = ctx.createRadialGradient(
        proj.sx - r * 0.3, proj.sy - r * 0.3, 0,
        proj.sx, proj.sy, r
      );
      grad.addColorStop(0, `#ffffff${hex(0.9 * alpha * dim)}`);
      grad.addColorStop(0.3, `${color}${hex(0.85 * alpha * dim)}`);
      grad.addColorStop(1, `${color}${hex(0.4 * alpha * dim)}`);
      ctx.fillStyle = grad;
      ctx.shadowColor = color;
      ctx.shadowBlur = isHover ? 28 : (isCenter ? 24 : 14 * alpha);
      ctx.beginPath();
      ctx.arc(proj.sx, proj.sy, r * (isHover ? 1.15 : 1), 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // 高光环
      ctx.strokeStyle = `#ffffff${hex(0.7 * alpha * dim)}`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(proj.sx, proj.sy, r * (isHover ? 1.15 : 1), 0, Math.PI*2);
      ctx.stroke();
    }

    // highlight 节点（行业图谱里来源企业）额外光环
    if (node.highlight) {
      ctx.strokeStyle = `rgba(200,176,255,${0.6 * alpha})`;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#C8B0FF';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(proj.sx, proj.sy, r * 1.4, 0, Math.PI*2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    // 标签
    if (alpha > 0.5 && (isCenter || isHover || hoverNode === null || node.highlight)) {
      ctx.fillStyle = `rgba(255,255,255,${0.9 * alpha * dim})`;
      ctx.font = `${isCenter ? '600 15px' : '500 12px'} "DM Sans", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const labelOffset = (node.isIndustry || node.useOrb) ? r * 1.5 + 14 : (r * (isHover ? 1.15 : 1) + 8);
      ctx.fillText(node.name, proj.sx, proj.sy + labelOffset);
    }
    // 徽章：N 校友 / N 同会 / N 同事
    if (node._badge && node._badge > 0 && alpha > 0.4) {
      const badgeR = 9;
      const bx = proj.sx + r * 0.85;
      const by = proj.sy - r * 0.85;
      let badgeColor = '#E8B8E0';
      if (node.isSchool) badgeColor = '#B0C8FF';
      else if (node.isAssoc) badgeColor = '#E0CCFF';
      else if (node.isCompany || node.isPlaceholder) badgeColor = '#C8B0FF';
      ctx.fillStyle = badgeColor;
      ctx.globalAlpha = 0.92 * alpha * dim;
      ctx.shadowColor = badgeColor;
      ctx.shadowBlur = 8 * alpha;
      ctx.beginPath();
      ctx.arc(bx, by, badgeR, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#1a1a1a';
      ctx.font = '600 10px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(node._badge, bx, by + 0.5);
    }
  });

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// 16 进制 alpha
function hex(a) {
  const v = Math.max(0, Math.min(1, a));
  return Math.round(v * 255).toString(16).padStart(2, '0');
}

// 画一个水平环（在 3D 空间投影后用虚线连接）
function drawRing(ring) {
  const SEGMENTS = 64;
  const points = [];
  for (let i = 0; i < SEGMENTS; i++) {
    const theta = (i / SEGMENTS) * Math.PI * 2;
    const x = ring.radius * Math.cos(theta);
    const z = ring.radius * Math.sin(theta);
    points.push(project({ x, y: ring.y, z }));
  }
  ctx.setLineDash([3, 3]);
  ctx.lineWidth = 0.7;
  ctx.shadowBlur = 0;
  // 分段画，每段根据深度调透明度
  for (let i = 0; i < SEGMENTS; i++) {
    const a = points[i];
    const b = points[(i + 1) % SEGMENTS];
    const depth = (a.depthFactor + b.depthFactor) / 2;
    if (depth < 0.2) continue;  // 太靠后的不画
    ctx.strokeStyle = `${ring.color}${hex(0.16 * depth)}`;
    ctx.beginPath();
    ctx.moveTo(a.sx, a.sy);
    ctx.lineTo(b.sx, b.sy);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

// ═══════════════════════════════════════════════════════════════
// 鼠标交互
// ═══════════════════════════════════════════════════════════════
canvas.addEventListener('mousedown', e => {
  // 如果详情卡开着且没点中节点，关掉
  if ($('entDetail').classList.contains('show') && !pickNode(e.clientX, e.clientY)) {
    closeEntDetail();
  }
  isDragging = true;
  lastMx = e.clientX;
  lastMy = e.clientY;
  userInteractedAt = performance.now();
});
window.addEventListener('mouseup', e => {
  if (isDragging) {
    // 检测是否是点击（位移很小）
    const dx = e.clientX - lastMx;
    const dy = e.clientY - lastMy;
    if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
      handleClick(e);
    }
  }
  isDragging = false;
});
window.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - lastMx;
    const dy = e.clientY - lastMy;
    rotateY += dx * 0.006;
    rotateX += dy * 0.006;
    velocityY = dx * 0.0015;
    velocityX = dy * 0.0015;
    lastMx = e.clientX;
    lastMy = e.clientY;
    userInteractedAt = performance.now();
  } else if (nodes.length) {
    // hover 检测
    const hit = pickNode(e.clientX, e.clientY);
    if (hit !== hoverNode) {
      hoverNode = hit;
      canvas.style.cursor = hit ? 'pointer' : 'grab';
      if (hit) showTip(hit, e.clientX, e.clientY);
      else $('tip').classList.remove('show');
    } else if (hit) {
      moveTip(e.clientX, e.clientY);
    }
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.92 : 1.08;
  zoom = Math.max(0.4, Math.min(2.5, zoom));
  userInteractedAt = performance.now();
}, { passive:false });

function pickNode(mx, my) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (n.isAxis) continue;
    const p = project(n);
    const dx = mx - p.sx;
    const dy = my - p.sy;
    const r = (n.r || 20) * p.scale;
    if (dx*dx + dy*dy <= r*r * 1.3) return n;
  }
  return null;
}

function handleClick(e) {
  const hit = pickNode(e.clientX, e.clientY);
  if (!hit || hit.id === centerId) return;
  if (hit.isIndustry || (hit.id && hit.id.startsWith('_INDUSTRY_'))) return;

  // 路由（高层图谱）
  if (hit.isPerson) {
    showPersonDetail(hit);
  } else if (hit.isSchool || hit.isAssoc || hit.isCompany || hit.isPlaceholder) {
    showAggregateDetail(hit);
  } else {
    showEntDetail(hit);
  }
}

function showPersonDetail(node) {
  const p = node.personData || PERSONS.find(x => x.id === node.id);
  if (!p) return;
  const panel = $('entDetail');
  const positions = POSITIONS.filter(x => x.person_id === p.id);
  const edus = EDUCATIONS.filter(x => x.person_id === p.id);
  const assocs = ASSOCIATIONS.filter(x => x.person_id === p.id);
  const company = ENTERPRISES.find(e => e.id === p.current_company_id);

  const posHtml = positions.map(pos => {
    const ent = getEnt(pos.company_id);
    const typeIcon = pos.type === 'current' ? '★' : (pos.type === 'concurrent' ? '◆' : '○');
    const typeColor = pos.type === 'current' ? '#E8DFFF' : (pos.type === 'concurrent' ? '#C8B0FF' : 'rgba(255,255,255,.4)');
    const clickable = ent ? `onclick="closeEntDetail(); setTimeout(()=>buildCompanyPersonsGraph('${ent.id}'), 200)"` : '';
    return `<div class="exec-pos-row" ${clickable} ${ent ? 'style="cursor:pointer"' : ''}>
      <span class="exec-pos-icon" style="color:${typeColor}">${typeIcon}</span>
      <div class="exec-pos-meta">
        <div class="exec-pos-comp">${pos.company_name || ent?.name || '未知公司'}</div>
        <div class="exec-pos-title">${pos.title} · ${pos.period || ''}</div>
      </div>
      ${ent ? '<span class="exec-pos-arrow">→</span>' : ''}
    </div>`;
  }).join('');

  const eduHtml = edus.map(e => `<div class="exec-edu-row">
    <span class="exec-edu-school">${e.school_name}</span>
    <span class="exec-edu-degree">${e.degree || ''}${e.major ? ' · ' + e.major : ''}</span>
  </div>`).join('');

  const assocHtml = assocs.map(a => `<span class="exec-assoc-chip">${a.association_name}${a.role ? ' · ' + a.role : ''}</span>`).join('');

  panel.innerHTML = `
    <button class="det-close" onclick="closeEntDetail()" aria-label="关闭">✕</button>
    <div class="det-eyebrow">高层详情</div>
    <div class="det-name">${p.name}</div>
    <div class="det-aliases">${p.current_title || ''}${company ? ' · ' + company.name : ''}</div>
    <div class="det-intro" style="margin-bottom:18px">${p.intro || ''}</div>
    ${(p.highlights||[]).length ? `<div class="exec-hls" style="margin-bottom:16px">${p.highlights.map(h=>`<span class="exec-hl">${h}</span>`).join('')}</div>` : ''}
    ${positions.length ? `<div class="exec-section-t">任职履历</div><div class="exec-pos-list">${posHtml}</div>` : ''}
    ${edus.length ? `<div class="exec-section-t" style="margin-top:14px">教育背景</div><div class="exec-edu-list">${eduHtml}</div>` : ''}
    ${assocs.length ? `<div class="exec-section-t" style="margin-top:14px">协会任职</div><div class="exec-assoc-list">${assocHtml}</div>` : ''}
    <button class="det-cta" style="margin-top:18px" onclick="closeEntDetail(); setTimeout(()=>buildPersonGraph('${p.id}'), 200)">
      <span>以 ${p.name} 为中心查看图谱</span>
      <span class="det-cta-arrow">→</span>
    </button>
  `;
  panel.classList.add('show');
}

function showSchoolAssocTip(node) {

  const kind = node.isSchool ? '母校' : (node.isAssoc ? '协会' : '历史公司');
  const color = node.isSchool ? '#B0C8FF' : (node.isAssoc ? '#E0CCFF' : '#C8B0FF');

    <button class="det-close" onclick="closeEntDetail()" aria-label="关闭">✕</button>
    <div class="det-eyebrow" style="color:${color}">${kind}</div>
    <div class="det-name">${node.name}</div>

    <div class="det-intro">${kind === '母校' ? '校友图谱即将上线，将展示同校的所有高层。' : (kind === '协会' ? '会员图谱即将上线，将展示同会的所有高层。' : '该公司在企业数据库中暂未收录。')}</div>
  `;

function showRelationDetail(otherId) {
  const relations = window._currentRelations || [];
  const rel = relations.find(r => r.otherId === otherId);
  const me = PERSONS.find(p => p.id === window._currentPersonId);
  if (!rel || !me) return;

  const sections = [];
  if (rel.reasons.sameCompany.length) {
    sections.push(`
      <div class="rel-section">
        <div class="rel-section-t"><span class="rel-section-icon">⬢</span> 共同任职 (${rel.reasons.sameCompany.length})</div>
        ${rel.reasons.sameCompany.map(c => {
          const myLines = c.my_positions.map(p => `${p.title}${p.period?' · '+p.period:''}`).join(' / ');
          const otherLines = c.other_positions.map(p => `${p.title}${p.period?' · '+p.period:''}`).join(' / ');
          return `<div class="rel-section-row">
            <div class="rel-section-main">${c.company_name}</div>
            <div class="rel-section-sub">${me.name}：${myLines}</div>
            <div class="rel-section-sub">${rel.other.name}：${otherLines}</div>
          </div>`;
        }).join('')}
      </div>
    `);
  }
  if (rel.reasons.sameSchool.length) {
    sections.push(`
      <div class="rel-section">
        <div class="rel-section-t"><span class="rel-section-icon" style="color:#B0C8FF">⬡</span> 校友 (${rel.reasons.sameSchool.length})</div>
        ${rel.reasons.sameSchool.map(s => {
          const formatEdu = e => `${e.degree||''}${e.major?' · '+e.major:''}${e.year?' · '+e.year:''}`;
          const myLines = s.my_edus.sort((a,b) => (a.year||0)-(b.year||0)).map(formatEdu).join(' / ');
          const otherLines = s.other_edus.sort((a,b) => (a.year||0)-(b.year||0)).map(formatEdu).join(' / ');
          return `<div class="rel-section-row">
            <div class="rel-section-main">${s.school_name}</div>
            <div class="rel-section-sub">${me.name}：${myLines}</div>
            <div class="rel-section-sub">${rel.other.name}：${otherLines}</div>
          </div>`;
        }).join('')}
      </div>
    `);
  }
  if (rel.reasons.sameAssoc.length) {
    sections.push(`
      <div class="rel-section">
        <div class="rel-section-t"><span class="rel-section-icon" style="color:#E0CCFF">⬣</span> 同会 (${rel.reasons.sameAssoc.length})</div>
        ${rel.reasons.sameAssoc.map(a => `
          <div class="rel-section-row">
            <div class="rel-section-main">${a.association_name}</div>
            <div class="rel-section-sub">${me.name}：${(a.my_roles||['会员']).join(' / ')}</div>
            <div class="rel-section-sub">${rel.other.name}：${(a.other_roles||['会员']).join(' / ')}</div>
          </div>
        `).join('')}
      </div>
    `);
  }
  if (rel.reasons.coEvents.length) {
    sections.push(`
      <div class="rel-section">
        <div class="rel-section-t"><span class="rel-section-icon" style="color:#E8B8E0">◈</span> 共同活动 (${rel.reasons.coEvents.length})</div>
        ${rel.reasons.coEvents.map(e => `
          <div class="rel-section-row">
            <div class="rel-section-main">${e.event_name}</div>
            <div class="rel-section-sub">${e.event_date||''}</div>
          </div>
        `).join('')}
      </div>
    `);
  }

  $('relationPanelContent').innerHTML = `
    <div class="rel-panel-eyebrow">RELATIONSHIP · 关系详情</div>
    <div class="rel-panel-title">${me.name} <span class="rel-panel-x">×</span> ${rel.other.name}</div>
    <div class="rel-panel-subtitle">${rel.other.current_title || ''}</div>
    ${sections.join('')}
    <button class="det-cta" style="margin-top:18px" onclick="closeRelationDetail(); setTimeout(()=>buildPersonGraph('${rel.otherId}'), 100)">
      <span>以 ${rel.other.name} 为中心 →</span>
    </button>
  `;
  $('relationPanel').classList.add('show');
}

function closeRelationDetail() {
  $('relationPanel').classList.remove('show');
}

function showAggregateDetail(node) {
  const panel = $('relationPanel');
  const content = $('relationPanelContent');

  if (node.isSchool) {
    const school = node.eduData.school_name;
    // 按人聚合多段学历
    const alumniMap = {};
    EDUCATIONS.filter(e => e.school_name === school).forEach(e => {
      const p = PERSONS.find(x => x.id === e.person_id);
      if (!p) return;
      if (!alumniMap[p.id]) alumniMap[p.id] = { person: p, edus: [] };
      alumniMap[p.id].edus.push(e);
    });
    const alumni = Object.values(alumniMap);
    content.innerHTML = `
      <div class="rel-panel-eyebrow" style="color:#B0C8FF">SCHOOL · 校友</div>
      <div class="rel-panel-title">${school}</div>
      <div class="rel-panel-subtitle">PRISM 收录 ${alumni.length} 位校友</div>
      <div class="rel-section">
        ${alumni.map(({person, edus}) => {
          const eduLines = edus
            .sort((a,b) => (a.graduation_year||9999) - (b.graduation_year||9999))
            .map(e => `${e.degree||''}${e.major?' · '+e.major:''}${e.graduation_year?' · '+e.graduation_year:''}`)
            .join('<br>');
          return `<div class="rel-section-row" onclick="closeRelationDetail(); setTimeout(()=>buildPersonGraph('${person.id}'), 100)" style="cursor:pointer">
            <div class="rel-section-main">${person.name} <span class="rel-section-tag">${person.current_title||''}</span></div>
            <div class="rel-section-sub">${eduLines}</div>
          </div>`;
        }).join('')}
      </div>
    `;
    panel.classList.add('show');
  } else if (node.isAssoc) {
    const assocName = node.assocData.association_name;
    // 按人聚合（同一人在同协会可能有多角色）
    const peerMap = {};
    ASSOCIATIONS.filter(a => a.association_name === assocName).forEach(a => {
      const p = PERSONS.find(x => x.id === a.person_id);
      if (!p) return;
      if (!peerMap[p.id]) peerMap[p.id] = { person: p, roles: [] };
      peerMap[p.id].roles.push(a.role || '会员');
    });
    const peers = Object.values(peerMap).map(x => ({ person: x.person, assoc: { role: x.roles.join(' / ') }}));
    content.innerHTML = `
      <div class="rel-panel-eyebrow" style="color:#E0CCFF">ASSOCIATION · 协会</div>
      <div class="rel-panel-title">${assocName}</div>
      <div class="rel-panel-subtitle">PRISM 收录 ${peers.length} 位会员</div>
      <div class="rel-section">
        ${peers.map(({assoc, person}) => `
          <div class="rel-section-row" onclick="closeRelationDetail(); setTimeout(()=>buildPersonGraph('${person.id}'), 100)" style="cursor:pointer">
            <div class="rel-section-main">${person.name} <span class="rel-section-tag">${person.current_title||''}</span></div>
            <div class="rel-section-sub">${assoc.role||'会员'}</div>
          </div>
        `).join('')}
      </div>
    `;
    panel.classList.add('show');
  } else if (node.isCompany || node.isPlaceholder) {
    const cid = node.id;
    const ent = getEnt(cid);
    // 按人聚合
    const execMap = {};
    POSITIONS.filter(p => p.company_id === cid).forEach(p => {
      const person = PERSONS.find(x => x.id === p.person_id);
      if (!person) return;
      if (!execMap[person.id]) execMap[person.id] = { person, positions: [] };
      execMap[person.id].positions.push(p);
    });
    const execs = Object.values(execMap);
    content.innerHTML = `
      <div class="rel-panel-eyebrow">COMPANY · 任职高层</div>
      <div class="rel-panel-title">${ent?.name || node.name}</div>
      <div class="rel-panel-subtitle">PRISM 收录 ${execs.length} 位高层任职</div>
      <div class="rel-section">
        ${execs.map(({person, positions}) => {
          const posLines = positions
            .map(p => `${p.title} · ${p.period||''} · ${p.type==='current'?'现任':p.type==='concurrent'?'兼任':'历史'}`)
            .join('<br>');
          return `<div class="rel-section-row" onclick="closeRelationDetail(); setTimeout(()=>buildPersonGraph('${person.id}'), 100)" style="cursor:pointer">
            <div class="rel-section-main">${person.name} <span class="rel-section-tag">${person.current_title||''}</span></div>
            <div class="rel-section-sub">${posLines}</div>
          </div>`;
        }).join('')}
      </div>
      ${ent ? `<button class="det-cta" style="margin-top:14px" onclick="closeRelationDetail(); setTimeout(()=>buildCompanyPersonsGraph('${ent.id}'), 100)">
        <span>查看 ${ent.name} 高层图谱</span>
      </button>
      <button class="det-cta" style="margin-top:8px;background:linear-gradient(135deg,rgba(122,184,255,.16),rgba(184,160,255,.10));border-color:rgba(122,184,255,.32)" onclick="location.href='prism-graph-v1.html?focus=${ent.id}'">
        <span>跳转企业产业链图谱 ↗</span>
      </button>` : ''}
    `;
    panel.classList.add('show');
  }
}
