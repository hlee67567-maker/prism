function showEntDetail(node) {
  const ent = ENTERPRISES.find(e => e.id === node.id) || node;
  const panel = $('entDetail');
  let extraMeta = '';
  if (node.tier) {
    const TIER_COLORS = { '上游':'#B0C8FF', '中游':'#C8B0FF', '下游':'#E0CCFF' };
    extraMeta = `<div class="det-meta-row">
      <span class="det-tier-pill" style="background:${TIER_COLORS[node.tier]}22;border:1px solid ${TIER_COLORS[node.tier]}55;color:${TIER_COLORS[node.tier]}">${node.tier}</span>
      <span class="det-seg">${node.segment || ''}</span>
    </div>`;
  } else {
    let chLevelPill = '';
    if (ent.channel_level === 'national') {
      chLevelPill = `<span class="det-level-pill det-level-national">★ 全国总代</span>`;
    } else if (ent.channel_level === 'regional') {
      chLevelPill = `<span class="det-level-pill det-level-regional">◆ 区域代理</span>`;
    }
    extraMeta = `<div class="det-meta-row">
      <span class="det-tier-pill" style="background:${TYPE_COLORS[ent.type]}22;border:1px solid ${TYPE_COLORS[ent.type]}55;color:${TYPE_COLORS[ent.type]}">${TYPE_LABELS[ent.type]||ent.type}</span>
      ${chLevelPill}
      <span class="det-seg">${ent.sector || ''}</span>
    </div>`;
  }

  const fullName = ent.full_name || '';
  const credit = ent.credit_code || '';
  const aliasLine = (ent.short || []).slice(0, 5).join(' · ');

  let regBlock = '';
  if (fullName || credit) {
    regBlock = `<div class="det-reg">
      ${fullName ? `<div class="det-reg-row"><div class="det-reg-l">注册名称</div><div class="det-reg-v">${fullName}</div></div>` : ''}
      ${credit ? `<div class="det-reg-row"><div class="det-reg-l">统一社会信用代码</div><div class="det-reg-v det-reg-code">${credit}</div></div>` : ''}
    </div>`;
  }

  panel.innerHTML = `
    <button class="det-close" onclick="closeEntDetail()" aria-label="关闭">✕</button>
    <div class="det-eyebrow">企业详情</div>
    <div class="det-name">${ent.name}</div>
    ${aliasLine ? `<div class="det-aliases">${aliasLine}</div>` : ''}
    ${extraMeta}
    ${regBlock}
    <div class="det-intro">${ent.intro || '暂无简介'}</div>
    <button class="det-cta" onclick="closeEntDetail(); setTimeout(()=>buildGraph('${ent.id}'), 200)">
      <span>以 ${ent.name} 为中心查看图谱</span>
      <span class="det-cta-arrow">→</span>
    </button>
  `;
  panel.classList.add('show');
}

function closeEntDetail() {
  $('entDetail').classList.remove('show');
}

// ═══════════════════════════════════════════════════
// 过滤：按 type 显示/淡出节点
// ═══════════════════════════════════════════════════
function setFilter(type) {
  if (activeFilter === type) {
    activeFilter = null;  // 再次点击同一个 = 取消
  } else {
    activeFilter = type;
  }
  // 重新渲染信息卡 chips（保持 stats 区状态同步）
  refreshFilterChips();
}

function refreshFilterChips() {
  document.querySelectorAll('.stat-chip').forEach(btn => {
    const onclick = btn.getAttribute('onclick');
    const m = onclick.match(/setFilter\('?(\w+)'?\)/);
    const filterVal = m && m[1] !== 'null' ? m[1] : null;
    btn.classList.toggle('on', activeFilter === filterVal || (activeFilter === null && filterVal === null));
  });
}

function showTip(node, x, y) {
  const tip = $('tip');
  if (node.isCenter) {
    if (node.isIndustry) {
      $('tipName').innerHTML = node.name + ' <span class="tip-rel">· 行业图谱</span>';
      $('tipMeta').textContent = `点击外圈企业查看详情`;
    } else {
      $('tipName').innerHTML = node.name + ' <span class="tip-rel">· 当前中心</span>';
      $('tipMeta').textContent = `${node.sector}`;
    }
  } else if (node.isPerson) {
    $('tipName').innerHTML = node.name + ` <span class="tip-rel" style="color:#E8B8E0">· 高层</span>`;
    $('tipMeta').textContent = (node.personData?.current_title || '') + ' · 点击查看详情';
  } else if (node.isSchool) {
    $('tipName').innerHTML = node.name + ` <span class="tip-rel" style="color:#B0C8FF">· 母校</span>`;
    $('tipMeta').textContent = node.relLabel || '教育背景';
  } else if (node.isAssoc) {
    $('tipName').innerHTML = node.name + ` <span class="tip-rel" style="color:#E0CCFF">· 协会</span>`;
    $('tipMeta').textContent = node.relLabel || '协会任职';
  } else if (node.isCompany || node.isPlaceholder) {
    $('tipName').innerHTML = node.name + ` <span class="tip-rel">· 任职公司</span>`;
    $('tipMeta').textContent = (node.relLabel || '') + ' · 点击查看公司图谱';
  } else {
    if (node.tier) {
      // 行业图谱里的企业
      $('tipName').innerHTML = node.name + ` <span class="tip-rel" style="color:${node.tierColor}">· ${node.tier}</span>`;
      $('tipMeta').textContent = `${node.segment} · 点击查看详情`;
    } else {
      // 企业图谱里的节点
      $('tipName').innerHTML = node.name + ` <span class="tip-rel">· ${REL_LABELS[node.relType]||'相关'}</span>`;
      $('tipMeta').textContent = `${node.relLabel} · 热度 ${node.heat||0} · 点击查看详情`;
    }
  }
  moveTip(x, y);
  tip.classList.add('show');
}
function moveTip(x, y) {
  const tip = $('tip');
  tip.style.left = (x + 16) + 'px';
  tip.style.top = (y + 16) + 'px';
}

// 启动时聚焦搜索框
setTimeout(() => searchInput.focus(), 300);
